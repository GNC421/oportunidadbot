[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -q --disable-warnings --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=90
markers =
	unit: unit tests aislados con mocks/fakes
	integration: pruebas de integración entre módulos locales
	e2e: escenarios de flujo completo sin servicios externos reales
