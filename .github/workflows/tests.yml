name: Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - task/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m unit -q --no-cov

      - name: Run integration tests
        run: pytest -m integration -q --no-cov

      - name: Run e2e tests
        run: pytest -m e2e -q --no-cov

      - name: Run full suite with coverage gate
        run: pytest
